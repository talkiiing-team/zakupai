version: '3'

services:
  caddy:
    build: ./caddy
    ports:
      - 80:80
      - 443:443
    volumes:
      - caddy_data:/data

  api:
    restart: always
    build:
      context: .
      dockerfile: dockerfile
      target: api
    privileged: true
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}

  web:
    build:
      context: .
      dockerfile: dockerfile
      target: web

  mysql:
    image: mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  caddy_data:
  s3_bucket:
  mysql_data:
