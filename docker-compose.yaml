version: "3"

services:
  clickhouse:
    image: "clickhouse/clickhouse-server:24-alpine"
    ports:
      - 8123:8123
      - 9000:9000
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_DB=zakupai
      - CLICKHOUSE_USER=${CLICKHOUSE_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}

  caddy:
    build: "./caddy"
    ports:
      - 80:80
      - 443:443
    volumes:
      - caddy_data:/data

volumes:
  clickhouse_data:
  caddy_data:
